version: "3.6"

services:
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./dados:/var/lib/rabbitmq/
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  producer:
    build:
      context: ./Producer
    container_name: producer
    depends_on:
      - rabbitmq
    ports:
      - "8081:8080"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq

  avaliacao:
    build:
      context: ./Avaliacao
    container_name: avaliacao
    depends_on:
      - rabbitmq
    ports:
      - "8082:8080"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq

  seguro:
    build:
      context: ./Seguro
    container_name: seguro
    depends_on:
      - rabbitmq
    ports:
      - "8083:8080"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq